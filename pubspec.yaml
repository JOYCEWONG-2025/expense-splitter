name: expense_splitter
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  pdfx: ^2.6.0
  fl_chart: ^0.66.0
  flutter_localizations:
    sdk: flutter
  file_picker: ^8.0.0
  lottie: ^3.1.0
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ==========================================
  # 🎨 DISNEY / CINEMATIC HANDWRITING FONTS
  # ==========================================
  fonts:
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Regular.ttf
    
        - asset: assets/fonts/PatrickHand-Regular.ttf
        
    - family: PatrickHand  # 👈 Add this new family name configuration!
      fonts:
        - asset: assets/fonts/PatrickHand-Regular.ttf

  assets:
    - assets/backgrounds/food.jpg
    - assets/backgrounds/transport.jpeg
    - assets/backgrounds/shopping.jpg
    - assets/backgrounds/Accomo.jpg
    - assets/backgrounds/trip.jpeg
    - assets/backgrounds/others.jpg
    - assets/images/crumpled_ball.png
    - assets/images/receipt.jpg
    - assets/lottie/
    - assets/icons/
    - assets/rabbits/Running rabbit.json
    - assets/rabbits/bunny_hop.json
    - assets/rabbits/Rabbit Kick Scooter.json